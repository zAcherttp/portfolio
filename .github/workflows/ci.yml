name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'content/**'
      - '.gitattributes'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches:
      - dev
      - master
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'content/**'
      - '.gitattributes'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm lint

      - name: Check types
        run: pnpm tsc --noEmit

      - name: Validate component registry
        run: pnpm registry:validate

      - name: Run unit and component tests
        run: pnpm test:run

  browser:
    name: Build and browser behavior
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build production app
        run: pnpm build

      - name: Run browser behavior tests
        run: pnpm test:browser
